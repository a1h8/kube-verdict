name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

env:
  PYTHON_VERSION: "3.11"
  # Embedding model used by tests. huggingface.co intermittently blocks GitHub
  # Actions egress, so we cache the model across runs and run the test steps
  # offline (HF_HUB_OFFLINE) — see the per-job "Cache"/"Warm" steps below.
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  HF_CACHE_KEY: "hf-all-MiniLM-L6-v2-v1"

jobs:
  # ─────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --select=E,W,F --ignore=E501

  # ─────────────────────────────────────────────
  # Unit tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ env.HF_CACHE_KEY }}
          restore-keys: |
            hf-all-MiniLM-L6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Warm embedding-model cache (best-effort, online)
        run: |
          # huggingface.co intermittently blocks GitHub Actions egress — retry a
          # few times so a brief window is enough to seed the cross-run cache.
          # On total failure the offline test step skips model-dependent tests
          # (see tests/conftest.py) instead of erroring.
          ok=""
          for i in 1 2 3; do
            if python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('${{ env.EMBEDDING_MODEL }}')"; then ok=1; break; fi
            echo "::warning::HF fetch attempt $i/3 failed; retrying in 10s…"; sleep 10
          done
          [ -n "$ok" ] || echo "::warning::could not pre-fetch ${{ env.EMBEDDING_MODEL }} (HF unreachable) — model-dependent tests will be skipped"

      - name: Run unit tests with coverage
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest tests/unit/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.xml

  # ─────────────────────────────────────────────
  # Integration tests — offline only (no Ollama)
  # Ollama-requiring tests are marked `integration`
  # and excluded here; run them locally with Ollama.
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ env.HF_CACHE_KEY }}
          restore-keys: |
            hf-all-MiniLM-L6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Warm embedding-model cache (best-effort, online)
        run: |
          # huggingface.co intermittently blocks GitHub Actions egress — retry a
          # few times so a brief window is enough to seed the cross-run cache.
          # On total failure the offline test step skips model-dependent tests
          # (see tests/conftest.py) instead of erroring.
          ok=""
          for i in 1 2 3; do
            if python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('${{ env.EMBEDDING_MODEL }}')"; then ok=1; break; fi
            echo "::warning::HF fetch attempt $i/3 failed; retrying in 10s…"; sleep 10
          done
          [ -n "$ok" ] || echo "::warning::could not pre-fetch ${{ env.EMBEDDING_MODEL }} (HF unreachable) — model-dependent tests will be skipped"

      - name: Run integration tests (offline)
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest tests/integration/ -m "not integration" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage.xml

  # ─────────────────────────────────────────────
  # Full suite + combined coverage gate
  # ─────────────────────────────────────────────
  coverage:
    name: Full coverage gate (>75%)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ env.HF_CACHE_KEY }}
          restore-keys: |
            hf-all-MiniLM-L6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Warm embedding-model cache (best-effort, online)
        run: |
          # huggingface.co intermittently blocks GitHub Actions egress — retry a
          # few times so a brief window is enough to seed the cross-run cache.
          # On total failure the offline test step skips model-dependent tests
          # (see tests/conftest.py) instead of erroring.
          ok=""
          for i in 1 2 3; do
            if python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('${{ env.EMBEDDING_MODEL }}')"; then ok=1; break; fi
            echo "::warning::HF fetch attempt $i/3 failed; retrying in 10s…"; sleep 10
          done
          [ -n "$ok" ] || echo "::warning::could not pre-fetch ${{ env.EMBEDDING_MODEL }} (HF unreachable) — model-dependent tests will be skipped"

      - name: Run all tests and enforce coverage threshold
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest -m "not integration" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v --tb=short

      - name: Upload combined coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: coverage.xml
