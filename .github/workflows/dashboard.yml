name: Deploy dashboard

on:
  push:
    branches: [main]
    paths: [dashboard/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install score tools
        run: pip install mypy radon vulture
      - name: Generate scores
        run: python tools/score.py --output dashboard/src/scores.json
      - name: Generate roadmap
        run: python tools/roadmap.py --output dashboard/src/roadmap.json
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
      - run: touch dashboard/dist/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
