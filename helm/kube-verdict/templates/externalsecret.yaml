{{- if .Values.secrets.externalSecrets.enabled }}
# external-secrets.io: sync sensitive keys from an external provider (Vault,
# AWS/GCP Secrets Manager) into a Kubernetes Secret — no plaintext in values.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "kubeverdict.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeverdict.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.secrets.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.secrets.externalSecrets.target | default .Values.secrets.existingSecret | default (include "kubeverdict.fullname" .) }}
    creationPolicy: Owner
  data:
    {{- toYaml .Values.secrets.externalSecrets.data | nindent 4 }}
{{- end }}
