apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeverdict.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeverdict.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeverdict.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeverdict.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubeverdict.fullname" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kubeverdict
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.ui.enabled }}
          # UI mode: serve the Streamlit debug UI instead of the API service
          command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ ternary 8501 8000 .Values.ui.enabled }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kubeverdict.fullname" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (include "kubeverdict.fullname" .) }}
          livenessProbe:
            httpGet:
              path: {{ ternary "/_stcore/health" "/health" .Values.ui.enabled }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ ternary "/_stcore/health" "/health" .Values.ui.enabled }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: gitops-cache
              mountPath: /tmp/kubeverdict-gitops
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kubeverdict.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: gitops-cache
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
