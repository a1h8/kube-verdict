{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubewhisperer.fullname" . }}
  labels:
    {{- include "kubewhisperer.labels" . | nindent 4 }}
rules:
  # Core K8s resources (read-only)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - nodes
      - namespaces
      - services
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - serviceaccounts
      - events
    verbs: ["get", "list", "watch"]
  # Apps
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # RBAC inspection
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Helm releases (Flux / Helm operator CRDs)
  - apiGroups: ["helm.toolkit.fluxcd.io", "helm.sh"]
    resources: ["helmreleases", "helmreleases/status"]
    verbs: ["get", "list", "watch"]
  # Kyverno / OPA policy reports
  - apiGroups: ["wgpolicyk8s.io", "kyverno.io"]
    resources:
      - policyreports
      - clusterpolicyreports
      - admissionreports
    verbs: ["get", "list", "watch"]
  # HPA
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubewhisperer.fullname" . }}
  labels:
    {{- include "kubewhisperer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubewhisperer.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubewhisperer.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
