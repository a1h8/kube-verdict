# Declared chart values — order-service
replicaCount: 2

image:
  repository: ghcr.io/acme/order-service
  tag: "v4.2.1"
  pullPolicy: IfNotPresent

database:
  host: db-primary.production.svc.cluster.local
  port: 5432
  name: orders
  existingSecret: order-db-credentials

redis:
  host: redis.production.svc.cluster.local
  port: 6379

networkPolicy:
  enabled: false   # chart does NOT manage NetworkPolicies — managed by security team

resources:
  limits:
    memory: 512Mi
    cpu: "1"
  requests:
    memory: 256Mi
    cpu: 200m

service:
  type: ClusterIP
  port: 8080
