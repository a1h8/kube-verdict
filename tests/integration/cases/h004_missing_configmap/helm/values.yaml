# Declared chart values — api-gateway
replicaCount: 2

image:
  repository: ghcr.io/acme/api-gateway
  tag: "v1.3.0"
  pullPolicy: IfNotPresent

# The chart expects these resources to exist BEFORE deployment
config:
  existingConfigMap: api-gateway-config   # must be created: kubectl create configmap api-gateway-config ...
  existingSecret: api-gateway-tls-secret  # must be created: kubectl create secret ...

dbCredentials:
  existingSecret: db-credentials           # must be created with key: connection_string

resources:
  limits:
    memory: 512Mi
    cpu: "1"
  requests:
    memory: 256Mi
    cpu: 200m

service:
  type: ClusterIP
  port: 8080
