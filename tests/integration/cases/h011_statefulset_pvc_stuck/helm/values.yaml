replicaCount: 3

image:
  repository: confluentinc/cp-kafka
  tag: "7.5.0"
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: 4Gi
    cpu: "2"
  requests:
    memory: 2Gi
    cpu: "1"

persistence:
  enabled: true
  storageClass: standard
  size: 50Gi
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 9092
