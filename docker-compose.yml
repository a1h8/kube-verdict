version: "3.9"

services:
  kubeverdict:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - kw-data:/data
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
      - /tmp/kubeverdict-gitops:/tmp/kubeverdict-gitops
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  kw-data:
  ollama-data:
