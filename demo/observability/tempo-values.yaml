# Grafana Tempo — KubeWhisperer demo (single-binary, no auth)
tempo:
  reportingEnabled: false
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  retention: 1h

  # Accept OTLP over gRPC (port 4317) and HTTP (port 4318)
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # Expose HTTP query API on port 3200 (KubeWhisperer default)
  server:
    http_listen_port: 3200

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
