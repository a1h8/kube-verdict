# Scenario 6 — Healthy app (contrast / baseline)
# api-gateway is fully functional. Demonstrates that KubeVerdict
# correctly identifies which services are healthy vs failing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kubeverdict-demo
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    tier: frontend
    version: "3.0.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        tier: frontend
    spec:
      containers:
      - name: gateway
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kubeverdict-demo
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
