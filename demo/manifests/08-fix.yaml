# Remediation manifests — applied after human approval
#
# Fix 1: deploy a mock db-primary so payment-service can connect
# Fix 2: patch analytics-worker with enough memory to run

# ── Mock DB (netcat listening on 5432) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-primary
  namespace: kubewhisperer-demo
  labels:
    app: db-primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-primary
  template:
    metadata:
      labels:
        app: db-primary
    spec:
      containers:
      - name: db
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "[db-primary] Mock PostgreSQL ready on :5432"
          while true; do nc -l -p 5432 -e echo "mock-ok" 2>/dev/null || true; sleep 0.1; done
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
---
# ── payment-service: connect succeeds once db-primary is up ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: kubewhisperer-demo
  labels:
    app: payment-service
    app.kubernetes.io/name: payment-service
    tier: backend
    version: "1.4.3"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/name: payment-service
        tier: backend
    spec:
      containers:
      - name: payment
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "[payment-service] Starting v1.4.3 (patched)"
          echo "[payment-service] Connecting to postgres://db-primary.kubewhisperer-demo:5432/payments"
          if nc -z db-primary.kubewhisperer-demo 5432 2>/dev/null; then
            echo "[payment-service] Connected — running"
          else
            echo "[payment-service] DB not ready yet — retrying in 3s"
            sleep 3
          fi
          echo "[payment-service] OK — serving requests"
          sleep 3600
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        env:
        - name: DB_HOST
          value: "db-primary.kubewhisperer-demo"
        - name: DB_PORT
          value: "5432"
---
# ── analytics-worker: memory limit raised to 256Mi ───────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: analytics-worker
  namespace: kubewhisperer-demo
  labels:
    app: analytics-worker
    app.kubernetes.io/name: analytics-worker
    tier: worker
spec:
  restartPolicy: Always
  containers:
  - name: worker
    image: python:3.11-slim
    command: ["/bin/sh", "-c"]
    args:
    - |
      python3 - <<'EOF'
      import time
      print("[analytics-worker] Loading feature matrix into memory...", flush=True)
      blob = bytearray(200 * 1024 * 1024)
      print(f"[analytics-worker] Allocated {len(blob) // 1024 // 1024} MiB — OK (limit: 256Mi)", flush=True)
      print("[analytics-worker] Processing... done.", flush=True)
      time.sleep(3600)
      EOF
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"   # fixed: was 50Mi
        cpu: "200m"
